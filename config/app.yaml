network:
  listen_address: "0.0.0.0"
  port: 7000
  max_connections: 4096
  max_messages_per_window: 120

auth:
  issuer: "red-culture-service"
  audience: "unity-client"
  jwt_secret_env: "RCS_JWT_SECRET"
  token_ttl_seconds: 7200
  session_idle_timeout_seconds: 1800

storage:
  postgres_uri_env: "RCS_POSTGRES_URI"
  postgres_uri: "postgresql://postgres:postgres@127.0.0.1:5432/redculture"
  auto_migrate: true

ai:
  provider: "openai"
  base_url: "https://api.openai.com/v1"
  api_key_env: "OPENAI_API_KEY"
  model: "gpt-4.1-mini"
  timeout_ms: 8000
  max_retries: 2

voice_tts:
  provider: "mock"
  base_url: ""
  api_key_env: ""
  voice_id: "zh-CN-narrator"
  language: "zh-CN"
  timeout_ms: 8000
  max_retries: 2
  cache_ttl_seconds: 1800

hot_reload:
  enabled: true
  check_interval_ms: 1000
